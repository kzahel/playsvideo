<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>playsvideo — debug</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root { --bg: #fff; --fg: #111; --muted: #999; --video-bg: #000; --file-color: #111; --log-bg: #f5f5f5; --log-border: #ddd; --panel-bg: #fafafa; --panel-border: #e5e5e5; --phase-idle: #4ade80; --phase-busy: #60a5fa; --phase-error: #f87171; --seg-requested: #2563eb; --seg-queued: #7c3aed; --seg-prefetching: #0f766e; --seg-processing: #ea580c; --seg-ready: #16a34a; --seg-cache-hit: #0891b2; --seg-delivered: #65a30d; --seg-canceled: #6b7280; --seg-aborted: #94a3b8; --seg-error: #dc2626; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #111; --fg: #eee; --muted: #999; --file-color: #eee; --log-bg: #0a0a0a; --log-border: #333; --panel-bg: #151515; --panel-border: #2e2e2e; --phase-idle: #4ade80; --phase-busy: #93c5fd; --phase-error: #f87171; --seg-requested: #60a5fa; --seg-queued: #a78bfa; --seg-prefetching: #2dd4bf; --seg-processing: #fb923c; --seg-ready: #4ade80; --seg-cache-hit: #22d3ee; --seg-delivered: #a3e635; --seg-canceled: #9ca3af; --seg-aborted: #cbd5e1; --seg-error: #f87171; }
    }
    html[data-theme="light"] { --bg: #fff; --fg: #111; --muted: #999; --file-color: #111; --log-bg: #f5f5f5; --log-border: #ddd; --panel-bg: #fafafa; --panel-border: #e5e5e5; --phase-idle: #16a34a; --phase-busy: #2563eb; --phase-error: #dc2626; --seg-requested: #2563eb; --seg-queued: #7c3aed; --seg-prefetching: #0f766e; --seg-processing: #ea580c; --seg-ready: #16a34a; --seg-cache-hit: #0891b2; --seg-delivered: #65a30d; --seg-canceled: #6b7280; --seg-aborted: #94a3b8; --seg-error: #dc2626; }
    html[data-theme="dark"] { --bg: #111; --fg: #eee; --muted: #999; --file-color: #eee; --log-bg: #0a0a0a; --log-border: #333; --panel-bg: #151515; --panel-border: #2e2e2e; --phase-idle: #4ade80; --phase-busy: #93c5fd; --phase-error: #f87171; --seg-requested: #60a5fa; --seg-queued: #a78bfa; --seg-prefetching: #2dd4bf; --seg-processing: #fb923c; --seg-ready: #4ade80; --seg-cache-hit: #22d3ee; --seg-delivered: #a3e635; --seg-canceled: #9ca3af; --seg-aborted: #cbd5e1; --seg-error: #f87171; }
    body { font-family: system-ui, sans-serif; margin: 2rem; background: var(--bg); color: var(--fg); }
    video { width: 100%; max-width: 1280px; display: none; margin-top: 1rem; background: var(--video-bg); }
    #status { margin-top: 0.5rem; color: var(--muted); }
    input[type="file"] { font-size: 1rem; color: var(--file-color); }
    .player-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .player-controls button {
      background: none;
      border: 1px solid var(--muted);
      color: var(--fg);
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .player-controls button:hover { border-color: var(--fg); }
    .player-controls button:disabled { opacity: 0.5; cursor: default; }
    #subtitle-status {
      margin-bottom: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      min-height: 1.25rem;
    }
    .header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .theme-toggle { background: none; border: 1px solid var(--muted); color: var(--fg); border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; opacity: 0.6; flex-shrink: 0; }
    .theme-toggle:hover { opacity: 1; }
    .workers {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
    }
    .workers-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .workers-title { font-size: 14px; font-weight: 600; }
    .workers-summary { color: var(--muted); font-size: 12px; }
    .worker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.75rem;
    }
    .worker-card {
      padding: 0.9rem;
      background: var(--bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
    }
    .worker-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .worker-phase {
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border: 1px solid currentColor;
    }
    .worker-phase-idle { color: var(--phase-idle); }
    .worker-phase-starting, .worker-phase-loading-codec, .worker-phase-transcoding { color: var(--phase-busy); }
    .worker-phase-error { color: var(--phase-error); }
    .worker-line {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.75rem;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    .worker-line + .worker-line { margin-top: 0.2rem; }
    .worker-line-label { color: var(--muted); }
    .worker-line-value { text-align: right; word-break: break-word; }
    .worker-line-error .worker-line-value { color: var(--phase-error); }
    .segments {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
    }
    .segments-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .segments-title { font-size: 14px; font-weight: 600; }
    .segments-summary { color: var(--muted); font-size: 12px; }
    .segment-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 0.75rem;
      margin-bottom: 0.9rem;
    }
    .segment-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 12px;
      color: var(--muted);
    }
    .segment-swatch {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: currentColor;
    }
    .segment-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .segment-empty {
      color: var(--muted);
      font-size: 12px;
    }
    .segment-row {
      display: grid;
      grid-template-columns: minmax(180px, 220px) 1fr;
      gap: 0.9rem;
      align-items: center;
    }
    .segment-meta {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      min-width: 0;
    }
    .segment-meta-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }
    .segment-index {
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12px;
      font-weight: 700;
    }
    .segment-phase-pill {
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      border: 1px solid currentColor;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .segment-stats {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .segment-track {
      position: relative;
      height: 18px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--panel-border) 55%, transparent);
      overflow: hidden;
    }
    .segment-block {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 999px;
      min-width: 3px;
      opacity: 0.95;
    }
    .segment-phase-requested { color: var(--seg-requested); }
    .segment-phase-queued { color: var(--seg-queued); }
    .segment-phase-prefetching { color: var(--seg-prefetching); }
    .segment-phase-processing { color: var(--seg-processing); }
    .segment-phase-ready { color: var(--seg-ready); }
    .segment-phase-cache-hit { color: var(--seg-cache-hit); }
    .segment-phase-delivered { color: var(--seg-delivered); }
    .segment-phase-canceled { color: var(--seg-canceled); }
    .segment-phase-aborted { color: var(--seg-aborted); }
    .segment-phase-error { color: var(--seg-error); }
    .segment-block.segment-phase-requested { background: var(--seg-requested); }
    .segment-block.segment-phase-queued { background: var(--seg-queued); }
    .segment-block.segment-phase-prefetching { background: var(--seg-prefetching); }
    .segment-block.segment-phase-processing { background: var(--seg-processing); }
    .segment-block.segment-phase-ready { background: var(--seg-ready); }
    .segment-block.segment-phase-cache-hit { background: var(--seg-cache-hit); }
    .segment-block.segment-phase-delivered { background: var(--seg-delivered); }
    .segment-block.segment-phase-canceled { background: var(--seg-canceled); }
    .segment-block.segment-phase-aborted { background: var(--seg-aborted); }
    .segment-block.segment-phase-error { background: var(--seg-error); }
    @media (max-width: 760px) {
      .segment-row {
        grid-template-columns: 1fr;
      }
    }
    #log {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--log-bg);
      border: 1px solid var(--log-border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      max-height: 60vh;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-ready { color: #4ade80; }
    .log-error { color: #f87171; }
    .log-loading { color: #60a5fa; }
    .log-segment { color: #a3a3a3; }
    .log-subtitle { color: #c084fc; }
    .log-hls { color: #fbbf24; }
    .log-warn { color: #fb923c; }
  </style>
  <script>
    (function() {
      var t = localStorage.getItem('pv-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>
  <div class="header">
    <svg width="300" height="48" viewBox="0 0 340 48">
      <polygon points="2,4 2,44 32,24" fill="currentColor"/>
      <text x="44" y="38" font-family="'Inter', sans-serif" font-weight="700" font-size="38" fill="currentColor" letter-spacing="-2">plays</text>
      <text x="164" y="38" font-family="'Inter', sans-serif" font-weight="300" font-size="38" fill="currentColor" letter-spacing="-2">video</text>
    </svg>
    <span style="color: var(--muted); font-size: 12px;">debug</span>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme"></button>
  </div>
  <div class="player-controls">
    <input type="file" id="file-input">
    <input type="file" id="subtitle-input" accept=".srt,.vtt" style="display:none">
    <button id="load-subtitles" disabled>Load subtitles</button>
    <button id="clear-subtitles" disabled>Clear subtitles</button>
  </div>
  <p id="status">Select a video file to play.</p>
  <div id="subtitle-status"></div>
  <video id="video" controls autoplay></video>
  <section class="workers">
    <div class="workers-header">
      <div class="workers-title">Codec path</div>
      <div class="workers-summary" id="codec-summary"></div>
    </div>
    <div class="worker-grid">
      <section class="worker-card" id="codec-list"></section>
    </div>
  </section>
  <section class="workers">
    <div class="workers-header">
      <div class="workers-title">Wasm workers</div>
      <div class="workers-summary" id="worker-summary"></div>
    </div>
    <div class="worker-grid" id="worker-list"></div>
  </section>
  <section class="segments">
    <div class="segments-header">
      <div class="segments-title">Segment timeline</div>
      <div class="segments-summary" id="segment-summary"></div>
    </div>
    <div class="segment-legend" id="segment-legend"></div>
    <div class="segment-list" id="segment-list"></div>
  </section>
  <div id="log"></div>
  <script type="module" src="/src/debug.ts"></script>
  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      function isDark() {
        var t = document.documentElement.getAttribute('data-theme');
        if (t) return t === 'dark';
        return matchMedia('(prefers-color-scheme: dark)').matches;
      }
      function update() { btn.textContent = isDark() ? '\u2600' : '\u263E'; }
      btn.addEventListener('click', function() {
        var next = isDark() ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('pv-theme', next);
        update();
      });
      update();
      matchMedia('(prefers-color-scheme: dark)').addEventListener('change', update);
    })();
  </script>
</body>
</html>
